name: validate
on: [push, pull_request]
permissions: read-all
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: install
        run: pip install -e .
      - name: release gate
        run: python scripts/check_release.py
